<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>requests ~ potato</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="request a game" />
  <link rel="stylesheet" type="text/css" href="../styles.css" />
  <link rel="stylesheet" type="text/css" href="../clanker.css" />
  <link rel="icon" href="favicon.png">
  <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>
  <link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">
  <style>
    .request-form-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
    }

    #header p {
      opacity: 0.7;
      font-size: 0.9rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 100%;
    }

    .field label {
      color: white;
      font-family: "Figtree", Arial, Helvetica, sans-serif;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .field input,
    .field textarea,
    .field select {
      background-color: #1a1a1a;
      border: 1px solid #ffffff;
      color: white;
      font-family: "Figtree", Arial, Helvetica, sans-serif;
      font-size: 0.95rem;
      padding: 0.6rem 0.8rem;
      width: 100%;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: #aaaaaa;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #555555;
    }

    .field textarea {
      resize: vertical;
      min-height: 90px;
    }

    .field select option {
      background-color: #242424;
      color: white;
    }

    .pageclip-form__submit {
      background-color: transparent !important;
      border: 1px solid #ffffff !important;
      color: white !important;
      font-family: "Figtree", Arial, Helvetica, sans-serif !important;
      font-size: 0.95rem !important;
      padding: 0.65rem 2rem !important;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease !important;
      width: 100%;
      margin-top: 0.25rem;
      border-radius: 0 !important;
    }

    .pageclip-form__submit:not([disabled]):hover {
      background-color: #ffffff !important;
      color: #242424 !important;
    }

    .pageclip-form__submit.pageclip-form__submit--success {
      border-color: #88dd88 !important;
      color: #88dd88 !important;
    }

    .muted {
      opacity: 0.45;
      font-size: 0.85em;
    }

    /* ad modal */
    #ad-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #ad-modal.open {
      display: flex;
    }

    #ad-modal-inner {
      background: #242424;
      border: 1px solid #ffffff;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      max-width: 340px;
      width: 100%;
    }

    #ad-modal-inner h3 {
      margin: 0;
      font-size: 1rem;
      color: white;
    }

    #ad-modal-inner p {
      margin: 0;
      font-size: 0.8rem;
      opacity: 0.55;
      text-align: center;
    }

    #container-56642a332a1aaa05d84f77c811ea7ea2 {
      width: 300px;
      height: 250px;
      background: #1a1a1a;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #ad-submit-btn {
      background-color: transparent;
      border: 1px solid #ffffff;
      color: white;
      font-family: "Figtree", Arial, Helvetica, sans-serif;
      font-size: 0.9rem;
      padding: 0.55rem 1.5rem;
      cursor: not-allowed;
      width: 100%;
      opacity: 0.4;
      transition: opacity 0.3s ease, background-color 0.2s ease, color 0.2s ease;
    }

    #ad-submit-btn.ready {
      opacity: 1;
      cursor: pointer;
    }

    #ad-submit-btn.ready:hover {
      background-color: #ffffff;
      color: #242424;
    }

    #ad-timer {
      font-size: 0.78rem;
      opacity: 0.5;
      color: white;
    }
  </style>
  <script>
    const _s = JSON.parse(localStorage.getItem('potato-settings') || '{}');
    if (!_s.disableAds) {
      document.write('<script async="async" data-cfasync="false" src="https://recollectsideway.com/56642a332a1aaa05d84f77c811ea7ea2/invoke.js"><\/script>');
    }
  </script>
</head>
<body>
  <div id="wrapper">
    <div id="header" class="center">
      <h1>requests</h1>
      <p>want a game added? fill this out :3</p>
    </div>

    <div class="request-form-wrapper">
      <form
        action="https://send.pageclip.co/nxgfc7AoXrluY5inMu7kHl8TLhir9v3T"
        class="pageclip-form"
        method="post"
        style="width:100%;display:flex;flex-direction:column;gap:0.9rem;"
      >
        <div class="field">
          <label for="game-name">game name</label>
          <input
            id="game-name"
            type="text"
            name="game_name"
            placeholder="what game do you want?"
            required
          />
        </div>

        <div class="field">
          <label for="game-type">game type</label>
          <select id="game-type" name="game_type" required>
            <option value="" disabled selected>select a type...</option>
            <option value="flash">flash</option>
            <option value="unity">unity</option>
            <option value="html5">html5</option>
            <option value="other">other / unsure</option>
          </select>
        </div>

        <div class="field">
          <label for="game-link">link to game <span class="muted">(optional)</span></label>
          <input
            id="game-link"
            type="url"
            name="game_link"
            placeholder="https://..."
          />
        </div>

        <div class="field">
          <label for="notes">notes <span class="muted">(optional)</span></label>
          <textarea
            id="notes"
            name="notes"
            placeholder="anything else we should know?"
          ></textarea>
        </div>

        <button type="submit" class="pageclip-form__submit">
          <span>send request</span>
        </button>
      </form>
    </div>
  </div>

  <div id="menu">
    <a href="/index.html">home</a><br>
    <a href="/requests">requests</a><br>
    <a href="/settings">settings</a><br>
    <a href="/credits">credits</a><br>
   
  </div>

  <!-- ad modal -->
  <div id="ad-modal">
    <div id="ad-modal-inner">
      <h3>please wait 5 seconds before submitting a game request</h3>
      <div id="container-56642a332a1aaa05d84f77c811ea7ea2"></div>
      <span id="ad-timer">please wait...</span>
      <button id="ad-submit-btn" disabled>send request</button>
      <p>ads help support the site!</p>
    </div>
  </div>

  <script src="/js/gaaames.js"></script>
  <script>
    const form = document.querySelector('.pageclip-form');
    const submitBtn = form.querySelector('.pageclip-form__submit');
    const modal = document.getElementById('ad-modal');
    const adContainer = document.getElementById('ad-container');
    const adSubmitBtn = document.getElementById('ad-submit-btn');
    const adTimer = document.getElementById('ad-timer');

    // intercept submit in capture phase before pageclip sees it
    submitBtn.addEventListener('click', function (e) {
      if (!form.checkValidity()) return;
      const settings = JSON.parse(localStorage.getItem('potato-settings') || '{}');
      if (settings.disableAds) return; // let form submit normally
      e.preventDefault();
      e.stopImmediatePropagation();
      openAdModal();
    }, true);

    function openAdModal() {
      modal.classList.add('open');

      let seconds = 5;
      adTimer.textContent = `please wait ${seconds}s...`;
      adSubmitBtn.disabled = true;
      adSubmitBtn.classList.remove('ready');

      const interval = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(interval);
          adTimer.textContent = 'good to go!';
          adSubmitBtn.disabled = false;
          adSubmitBtn.classList.add('ready');
        } else {
          adTimer.textContent = `please wait ${seconds}s...`;
        }
      }, 1000);
    }

    adSubmitBtn.addEventListener('click', async function () {
      modal.classList.remove('open');
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);

      const discordPayload = {
        username: "game requests",
        embeds: [{
          title: "🎮 new game request",
          color: 0xffffff,
          fields: [
            { name: "game", value: data.game_name || "—", inline: true },
            { name: "type", value: data.game_type || "—", inline: true },
            { name: "link", value: data.game_link ? `[open](${data.game_link})` : "—" },
            { name: "notes", value: data.notes || "—" },
          ],
          footer: { text: "via requests form" },
          timestamp: new Date().toISOString()
        }]
      };

      try {
        const res = await fetch('https://pageclip-discord.oro10jua.workers.dev', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item: { payload: data } }),
        });
        if (res.ok) {
          submitBtn.classList.add('pageclip-form__submit--success');
          submitBtn.querySelector('span').textContent = 'sent!';
        } else {
          console.error('worker error:', res.status, await res.text());
          submitBtn.querySelector('span').textContent = 'error, try again';
        }
      } catch (err) {
        console.error('fetch error:', err);
        submitBtn.querySelector('span').textContent = 'error, try again';
      }
    });
  </script>
   <script src="../js/theme.js"></script>
</body>
</html>
